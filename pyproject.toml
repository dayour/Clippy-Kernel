    "opentelemetry-sdk>=1.42.1",
    "opentelemetry-exporter-otlp-proto-grpc>=1.42.1",
]

commsagent-discord = ["discord.py>=2.7.1,<3"]
commsagent-slack = ["slack_sdk>=3.42.0,<4"]
commsagent-telegram = ["telethon>=1.43.2, <2"]

duckduckgo = ["ddgs>=8.1.1"]
tavily = ["tavily-python>=0.7.25"]

## dev dependencies

