windows-clippy-mcp = [
    "clippy-kernel[mcp]",
    "azure-identity>=1.25.3",
    "azure-keyvault-secrets>=4.11.0",
    "websockets>=16.0",
    "fastapi>=0.136.3,<1",
    "uvicorn>=0.48.0",
]

interop-crewai = [
    "crewai[tools]>=1.14.6,<2; python_version>='3.10' and python_version<'3.13'",
    "litellm>=1.86.2",
    "weaviate-client>=4.21.2,<5; python_version>='3.10' and python_version<'3.13'",
]
interop-langchain = ["langchain-community>=0.4.2,<1"]
interop-pydantic-ai = ["pydantic-ai>=1.104.0,<2"]
interop =[
    "clippy-kernel[interop-crewai, interop-langchain, interop-pydantic-ai]"
]

autobuild = [
    "chromadb",
    "sentence_transformers>=5.5.1,<6.0",
    "huggingface-hub"
]

blendsearch = ["flaml[blendsearch]"]
mathchat = ["sympy", "wolframalpha"]
captainagent = ["clippy-kernel[autobuild]", "pandas"]
teachable = ["chromadb"]
lmm = ["replicate", "pillow"]
