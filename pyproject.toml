    "fastembed>=0.3.1",
]

retrievechat-couchbase = [
    "clippy-kernel[retrievechat]",
    "couchbase>=4.3.0",
    "numpy",
]

graph-rag-falkor-db = [
    "graphrag_sdk>=1.1.1,<2",
    "falkordb>=1.6.1",
]

rag = [
    "docling>=2.96.0,<3",
    "selenium>=4.44.0,<5",
    "webdriver-manager>=4.1.1,<5",
    "chromadb>=1.5,<2",
    "llama-index>=0.14,<0.15",
