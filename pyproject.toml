    "google-api-core",
    "google-genai>=2.7.0",
    "google-cloud-aiplatform",
    "google-auth",
    "pillow",
    "jsonschema",
]

gemini-realtime = [
    "clippy-kernel[gemini]",
    "clippy-kernel[websockets]",
]

together = ["together>=2.16.0"]
websurfer = ["beautifulsoup4", "markdownify", "pdfminer.six", "pathvalidate"]
redis = ["redis"]
cosmosdb = ["azure-cosmos>=4.16.0"]
websockets = ["websockets>=16.0,<17"]
long-context = ["llmlingua<0.3"]
anthropic = ["anthropic[vertex]>=0.105.2"]
cerebras = ["cerebras_cloud_sdk>=1.67.0"]
