[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[metadata]
license_file = "LICENSE"
description_file = "README.md"

[project]
name = "clippy-kernel"
description = "Advanced R&D Fork of AG2 for Multi-Agent AI Research and Development"
readme = "README.md"
authors = [
    {name = "clippy kernel development team", email = "research@clippy-kernel.ai"},
    {name = "Chi Wang & Qingyun Wu (AG2 Core)", email = "support@ag2.ai"}
]

keywords = [
    "ai",
    "agent",
    "autogen",
    "ag2",
    "clippy-kernel",
    "multi-agent",
    "agentic",
    "mcp", 
    "research",
    "development-team",
    "collaborative-ai"
]

requires-python = ">=3.10,<3.15"

dynamic = ["version"]

classifiers = [
    "Development Status :: 5 - Production/Stable",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
]

dependencies = [
    "diskcache",
    "termcolor",
    "python-dotenv",
    "tiktoken",
    # Disallowing 2.6.0 can be removed when this is fixed https://github.com/pydantic/pydantic/issues/8705
    "pydantic>=2.13.4,<3",
    "docker>=7.1.0",
    "packaging",
#    "fast-depends>=2.4.12,<3",  # integrated into the package
    "httpx>=0.28.1,<1",
    "anyio>=4.13.0,<5.0.0"  # needed by the internal fast-depends
]

[project.optional-dependencies]

a2a = [
    "a2a-sdk[http-server]>=1.1.0,<2",
]

ag-ui = [
    "ag-ui-protocol>=0.1.18,<0.2",
]

flaml = [
    "flaml",
    # numpy is installed by flaml, but we want to pin the version to below 2.x (see https://github.com/microsoft/autogen/issues/1960)
    "numpy>=2.1; python_version>='3.13'",  # numpy 2.1+ required for Python 3.13
    "numpy>=1.24.0,<2.0.0; python_version<'3.13'",  # numpy 1.24+ for older Python versions
]

# public distributions

openai = [
    "openai>=2.38.0",
]

openai-realtime = [
    "clippy-kernel[openai]",
    "openai[realtime]",
]

jupyter-executor = [
    "jupyter-kernel-gateway",
    "websocket-client",
    "requests",
    "jupyter-client>=8.8.0",
    "ipykernel>=7.2.0",
]

retrievechat = [
    "protobuf>=7.35.0,<8",
    "chromadb>=1.5.9,<2.0",
    "sentence_transformers>=5.5.1,<6.0",
    "pypdf",
    "ipython",
    "beautifulsoup4",
    "markdownify",
]

retrievechat-pgvector = [
    "clippy-kernel[retrievechat]",
    "pgvector>=0.2.5",
    "psycopg[binary]>=3.1.18; platform_system=='Windows' or platform_system=='Darwin'",
    "psycopg>=3.1.18; platform_system=='Linux'",
]

retrievechat-mongodb = [
    "clippy-kernel[retrievechat]",
    "pymongo>=4.0.0",
    "numpy",
]

retrievechat-qdrant = [
