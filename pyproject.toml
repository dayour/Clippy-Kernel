copilot-sdk = [
    "httpx>=0.28.1",
    "anthropic>=0.105.2",
    "google-generativeai>=0.8.0",
    "clippy-kernel[openai]",  # For OpenAI models
    "python-pptx>=1.0.0",  # For PowerPoint generation
